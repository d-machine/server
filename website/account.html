<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — ArthaDesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
  <style>
    body { background: #f1f5f9; }
  </style>
</head>
<body class="min-h-screen">

  <nav id="navbar"></nav>
  <script src="navbar.js"></script>

  <div class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">My Account</h1>

    <!-- Portfolio Accounts -->
    <div class="bg-white rounded-3xl shadow-[0_0_12px_rgb(0,0,0,0.20)] border border-gray-200 mb-5 overflow-hidden">
      <!-- Card header -->
      <div class="flex items-center justify-between px-6 py-4" style="background:#e9edf2;border-bottom:1px solid #d1d5db;">
        <h2 class="font-semibold text-gray-900">Portfolio Accounts</h2>
        <div class="flex items-center gap-2">
          <a href="/history" class="text-sm border border-blue-600 text-blue-600 rounded-xl px-3 py-1.5 hover:bg-blue-50 transition-colors">History</a>
          <a href="/subscribe" class="text-sm border border-blue-600 text-blue-600 rounded-xl px-3 py-1.5 hover:bg-blue-50 transition-colors">Submit payment</a>
          <button onclick="toggleAddForm()"
            class="text-sm bg-blue-600 text-white rounded-xl px-3 py-1.5 hover:bg-blue-700 transition-colors">
            + Add Person
          </button>
        </div>
      </div>

      <!-- Person list -->
      <div class="px-6">
        <div id="persons-loading" class="text-gray-400 text-sm py-4">Loading…</div>
        <div id="persons-list"></div>
        <div id="persons-empty" class="hidden text-sm text-gray-400 py-6 text-center">
          No portfolio accounts yet. Add a person to get started.
        </div>
      </div>

      <!-- Add person form -->
      <div id="add-person-form" class="hidden border-t border-gray-100 px-6 py-5 bg-gray-50/60">
        <h3 class="font-medium text-gray-800 mb-4 text-sm">Register a portfolio account</h3>
        <div id="add-person-error" class="hidden bg-red-50 text-red-700 text-sm rounded-xl px-4 py-3 mb-4 border border-red-200"></div>
        <div id="add-person-success" class="hidden bg-green-50 text-green-700 text-sm rounded-xl px-4 py-3 mb-4 border border-green-200"></div>

        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Display name</label>
            <input id="new-display-name" type="text" placeholder="e.g. Sumit Khaitan"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">PAN number</label>
            <input id="new-pan" type="text" placeholder="ABCDE1234F" maxlength="10"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm uppercase bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              oninput="this.value=this.value.toUpperCase()">
            <p class="text-xs text-gray-400 mt-1">Your PAN stays on your device — only a secure hash is sent to the server.</p>
          </div>
          <div class="flex gap-2 pt-1">
            <button onclick="submitAddPerson()"
              class="bg-blue-600 text-white rounded-xl px-5 py-2.5 text-sm font-medium hover:bg-blue-700 transition-colors">
              Register
            </button>
            <button onclick="toggleAddForm()"
              class="border border-gray-300 rounded-xl px-5 py-2.5 text-sm font-medium hover:bg-gray-100 transition-colors">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Account info -->
    <div class="bg-white rounded-3xl shadow-[0_0_12px_rgb(0,0,0,0.20)] border border-gray-200 overflow-hidden">
      <div class="px-6 py-4" style="background:#e9edf2;border-bottom:1px solid #d1d5db;">
        <h2 class="font-semibold text-gray-900">Account</h2>
      </div>
      <div class="px-6 py-4 space-y-3 text-sm">
        <div class="flex justify-between items-center bg-gray-50 rounded-2xl px-4 py-3">
          <span class="text-gray-500">Email</span>
          <span id="acc-email" class="font-medium text-gray-900"></span>
        </div>
        <div class="flex justify-between items-center bg-gray-50 rounded-2xl px-4 py-3">
          <span class="text-gray-500">Name</span>
          <span id="acc-name" class="font-medium text-gray-900"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/account.js"></script>
</body>
</html>
