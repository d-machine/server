services:
  portfolio-server:
    build: .
    container_name: portfolio-server-local
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./website:/app/website
    environment:
      - DB_PATH=/app/data/portfolio_server.db
      - AUTH_DB_PATH=/app/data/auth.db
      - LOGS_PATH=/app/logs
      - LOCAL_DEV=true
      - JWT_SECRET=local-dev-secret-key-change-in-prod
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - BASE_URL=http://localhost:8000
      - SMTP_PASS=
    restart: unless-stopped

  website:
    image: nginx:alpine
    container_name: portfolio-website-local
    ports:
      - "8080:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./nginx-website.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  admin:
    image: node:20-alpine
    container_name: portfolio-admin-local
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "8081:80"
    volumes:
      - ./website-admin:/app
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
