# Temporary HTTP-only config for SSL bootstrap.
# After certs are issued, replace with the full SSL config.

server {
    listen 80;
    server_name arthdeskapi.ashokitservices.com arthdesk.ashokitservices.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'nginx ok';
        add_header Content-Type text/plain;
    }
}
