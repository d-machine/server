# ── HTTPS: API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name arthdeskapi.ashokitservices.com;

    ssl_certificate     /etc/letsencrypt/live/arthdeskapi.ashokitservices.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arthdeskapi.ashokitservices.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    proxy_read_timeout    300s;
    proxy_connect_timeout  75s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass         http://portfolio-server:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

