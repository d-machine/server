services:
  portfolio-server:
    build: .
    container_name: portfolio-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # SQLite DB persisted outside container
    environment:
      - DB_PATH=data/portfolio_server.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
