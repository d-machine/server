server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /auth     { try_files /auth.html =404; }
    location = /account  { try_files /account.html =404; }
    location = /subscribe { try_files /subscribe.html =404; }
    location = /pricing  { try_files /pricing.html =404; }
    location = /history  { try_files /history.html =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
