services:
  portfolio-server:
    build: .
    container_name: portfolio-server
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./inbox:/app/inbox
      - ./errors:/app/errors
      - ./logs:/app/logs
      - ./scripts:/app/scripts
    environment:
      - DB_PATH=/app/data/portfolio_server.db
      - ERRORS_PATH=/app/errors
      - LOGS_PATH=/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  website:
    image: nginx:alpine
    container_name: portfolio-website
    expose:
      - "80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./nginx-website.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  admin:
    build:
      context: ./website-admin
      dockerfile: Dockerfile
    container_name: portfolio-admin
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - portfolio-server
      - website
      - admin
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: portfolio-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # Run manually: docker compose run --rm certbot certonly ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
