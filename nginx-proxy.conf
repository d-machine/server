# ── HTTPS: API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name arthdeskapi.ashokitservices.com;

    ssl_certificate     /etc/letsencrypt/live/arthdeskapi.ashokitservices.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arthdeskapi.ashokitservices.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    proxy_read_timeout    300s;
    proxy_connect_timeout  75s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass         http://portfolio-server:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# ── HTTPS: Website ────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name arthdesk.ashokitservices.com;

    ssl_certificate     /etc/letsencrypt/live/arthdesk.ashokitservices.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arthdesk.ashokitservices.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://website:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── HTTP: ACME challenge (certbot webroot) ────────────────────────────────────
server {
    listen 80;
    server_name arthdeskapi.ashokitservices.com arthdesk.ashokitservices.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
