<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment History — ArthaDesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
  <style>body { background: #f1f5f9; }</style>
</head>
<body class="min-h-screen">

  <nav id="navbar"></nav>
  <script src="navbar.js"></script>

  <div class="max-w-2xl mx-auto px-4 py-12">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">Payment History</h1>
      <a href="/account" class="text-sm text-gray-500 hover:text-gray-800">← My Account</a>
    </div>

    <div class="mb-5">
      <select id="person-filter"
        class="border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        <option value="all">All accounts</option>
      </select>
    </div>

    <div id="history-list" class="space-y-3"></div>
    <div id="history-empty" class="hidden text-center text-gray-400 py-10 text-sm">
      No approved payments found.
    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
