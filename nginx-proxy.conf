# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────────
server {
    listen 80;
    server_name arthdeskapi.ashokitservices.com arthdesk.ashokitservices.com arthdeskadmin.ashokitservices.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
