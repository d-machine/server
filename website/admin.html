<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Portfolio Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">

  <!-- Login overlay -->
  <div id="admin-login" class="fixed inset-0 bg-gray-900/80 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-sm">
      <h1 class="font-bold text-xl mb-6">Admin Login</h1>
      <div id="admin-login-error" class="hidden bg-red-50 text-red-700 text-sm rounded-lg px-4 py-3 mb-4"></div>
      <form id="admin-login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Username</label>
          <input type="text" id="admin-user" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input type="password" id="admin-pass" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white rounded-lg py-2.5 font-medium hover:bg-blue-700">Login</button>
      </form>
    </div>
  </div>

  <!-- Decline modal -->
  <div id="decline-modal" class="fixed inset-0 bg-gray-900/60 flex items-center justify-center z-40 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md">
      <h2 class="font-semibold mb-4">Decline subscription</h2>
      <textarea id="decline-reason" rows="3" placeholder="Reason for declining (will be emailed to user)…"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 mb-4"></textarea>
      <div class="flex gap-3">
        <button onclick="closeDeclineModal()" class="flex-1 border rounded-lg py-2 text-sm hover:bg-gray-50">Cancel</button>
        <button onclick="submitDecline()" class="flex-1 bg-red-600 text-white rounded-lg py-2 text-sm hover:bg-red-700">Decline</button>
      </div>
    </div>
  </div>

  <!-- Main admin panel -->
  <div id="admin-panel" class="hidden">
    <nav class="bg-white border-b">
      <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
        <span class="font-bold text-lg">Admin Panel</span>
        <div class="flex items-center gap-4">
          <span id="admin-user-label" class="text-sm text-gray-500"></span>
          <button onclick="adminLogout()" class="text-sm text-red-500 hover:text-red-700">Logout</button>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
      <!-- Filter bar -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button onclick="loadSubscriptions(null)" class="filter-btn active px-3 py-1.5 rounded-lg text-sm border bg-white" data-filter="">All</button>
        <button onclick="loadSubscriptions('PENDING_APPROVAL')" class="filter-btn px-3 py-1.5 rounded-lg text-sm border bg-white" data-filter="PENDING_APPROVAL">Pending</button>
        <button onclick="loadSubscriptions('ACTIVE')" class="filter-btn px-3 py-1.5 rounded-lg text-sm border bg-white" data-filter="ACTIVE">Active</button>
        <button onclick="loadSubscriptions('DECLINED')" class="filter-btn px-3 py-1.5 rounded-lg text-sm border bg-white" data-filter="DECLINED">Declined</button>
        <button onclick="loadSubscriptions('CANCELLED')" class="filter-btn px-3 py-1.5 rounded-lg text-sm border bg-white" data-filter="CANCELLED">Cancelled</button>
      </div>

      <div id="subs-loading" class="text-gray-400 text-sm">Loading…</div>
      <div id="subs-empty" class="hidden text-gray-400 text-sm">No subscriptions found.</div>
      <div id="subs-list" class="space-y-4"></div>
    </div>
  </div>

  <script>
    let adminCreds = null;
    let pendingDeclineId = null;

    function adminHeaders() {
      return { Authorization: 'Basic ' + btoa(adminCreds.user + ':' + adminCreds.pass) };
    }

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('admin-user').value;
      const pass = document.getElementById('admin-pass').value;
      // Test credentials by calling the API
      const res = await fetch('/subscriptions/admin', { headers: { Authorization: 'Basic ' + btoa(user + ':' + pass) } });
      if (res.status === 401) {
        document.getElementById('admin-login-error').textContent = 'Invalid credentials';
        document.getElementById('admin-login-error').classList.remove('hidden');
        return;
      }
      adminCreds = { user, pass };
      document.getElementById('admin-user-label').textContent = user;
      document.getElementById('admin-login').classList.add('hidden');
      document.getElementById('admin-panel').classList.remove('hidden');
      renderSubscriptions(await res.json());
    });

    function adminLogout() { adminCreds = null; location.reload(); }

    async function loadSubscriptions(status) {
      document.getElementById('subs-loading').classList.remove('hidden');
      document.getElementById('subs-list').innerHTML = '';
      document.getElementById('subs-empty').classList.add('hidden');
      // Update active filter
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-blue-50', 'border-blue-400', 'text-blue-700'));
      document.querySelector(`[data-filter="${status || ''}"]`)?.classList.add('bg-blue-50', 'border-blue-400', 'text-blue-700');

      const url = status ? `/subscriptions/admin?status=${status}` : '/subscriptions/admin';
      const res = await fetch(url, { headers: adminHeaders() });
      const data = await res.json();
      renderSubscriptions(data);
    }

    function renderSubscriptions(data) {
      document.getElementById('subs-loading').classList.add('hidden');
      if (!data.length) { document.getElementById('subs-empty').classList.remove('hidden'); return; }

      const STATUS_STYLES = {
        ACTIVE:           'bg-green-100 text-green-700',
        PENDING_APPROVAL: 'bg-yellow-100 text-yellow-700',
        DECLINED:         'bg-red-100 text-red-700',
        CANCELLED:        'bg-gray-100 text-gray-500',
      };
      const PLAN_LABELS = { MONTH: 'Monthly', QUARTER: 'Quarterly', SEMESTER: 'Half-Yearly', YEAR: 'Yearly' };

      document.getElementById('subs-list').innerHTML = data.map(s => `
        <div class="bg-white rounded-2xl shadow p-5">
          <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-medium px-2.5 py-0.5 rounded-full ${STATUS_STYLES[s.status] || ''}">${s.status.replace('_',' ')}</span>
                <span class="font-medium">${PLAN_LABELS[s.plan] || s.plan}</span>
                <span class="text-xs text-gray-400">#${s.subscription_id}</span>
              </div>
              <p class="text-sm text-gray-700">${s.name} &lt;${s.email}&gt;</p>
              <p class="text-xs text-gray-400 mt-0.5">Submitted: ${(s.submitted_at || '').slice(0,10)} ${s.expires_at ? '· Expires: ' + s.expires_at.slice(0,10) : ''}</p>
              ${s.decline_reason ? `<p class="text-xs text-red-600 mt-1">Reason: ${s.decline_reason}</p>` : ''}
              ${s.cancel_at ? `<p class="text-xs text-amber-600 mt-1">Auto-cancel at: ${s.cancel_at.slice(0,16)}</p>` : ''}
            </div>
            <div class="flex flex-col gap-2">
              ${s.screenshot_url ? `<a href="${s.screenshot_url}" target="_blank" class="text-xs text-blue-600 hover:underline border border-blue-200 rounded px-2 py-1">View Screenshot</a>` : '<span class="text-xs text-gray-400">No screenshot</span>'}
              ${s.status === 'PENDING_APPROVAL' || s.status === 'DECLINED' ? `
                <button onclick="approve(${s.subscription_id})" class="text-xs bg-green-600 text-white rounded px-2 py-1 hover:bg-green-700">✓ Approve</button>
                <button onclick="openDecline(${s.subscription_id})" class="text-xs bg-red-600 text-white rounded px-2 py-1 hover:bg-red-700">✗ Decline</button>
              ` : ''}
              <label class="text-xs text-gray-500 hover:text-gray-700 cursor-pointer">
                <input type="file" class="hidden" accept="image/*" onchange="uploadAdminScreenshot(${s.subscription_id}, this)">
                📎 Upload screenshot
              </label>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function approve(id) {
      if (!confirm('Approve this subscription?')) return;
      const res = await fetch(`/subscriptions/admin/${id}/approve`, { method: 'POST', headers: adminHeaders() });
      if (res.ok) { alert('Approved! Email sent to user.'); loadSubscriptions(null); }
      else { const d = await res.json(); alert('Error: ' + d.detail); }
    }

    function openDecline(id) {
      pendingDeclineId = id;
      document.getElementById('decline-reason').value = '';
      document.getElementById('decline-modal').classList.remove('hidden');
    }
    function closeDeclineModal() { document.getElementById('decline-modal').classList.add('hidden'); pendingDeclineId = null; }

    async function submitDecline() {
      const reason = document.getElementById('decline-reason').value.trim();
      if (!reason) { alert('Please enter a reason.'); return; }
      const form = new FormData();
      form.append('reason', reason);
      const res = await fetch(`/subscriptions/admin/${pendingDeclineId}/decline`, { method: 'POST', headers: adminHeaders(), body: form });
      if (res.ok) { closeDeclineModal(); alert('Declined. Email sent to user.'); loadSubscriptions(null); }
      else { const d = await res.json(); alert('Error: ' + d.detail); }
    }

    async function uploadAdminScreenshot(id, input) {
      if (!input.files[0]) return;
      const form = new FormData();
      form.append('screenshot', input.files[0]);
      const res = await fetch(`/subscriptions/admin/${id}/screenshot`, { method: 'POST', headers: adminHeaders(), body: form });
      if (res.ok) { alert('Screenshot uploaded and status reset to PENDING_APPROVAL.'); loadSubscriptions(null); }
      else { const d = await res.json(); alert('Error: ' + d.detail); }
    }
  </script>
</body>
</html>
